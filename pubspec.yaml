name: app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4
  firebase_storage: ^12.3.2
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_app_check: ^0.3.1+3

  # Auth / Social
  google_sign_in: ^6.2.2

  # Networking & Images
  http: ^1.2.2
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2

  # State & Local Storage
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  sqflite: ^2.3.3

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  latlong2: ^0.9.1

  # Maps & UI
  flutter_map: ^7.0.2
  fl_chart: ^0.68.0
  syncfusion_flutter_charts: ^32.2.9
  flutter_svg: ^2.0.10
  cupertino_icons: ^1.0.8

  flutter_settings_screens: ^0.3.4

  # ML
  tflite_flutter: ^0.11.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.2
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.4

  # Chat UI
  flutter_chat_ui: ^1.6.15
  flutter_chat_types: ^3.6.2

  # AI
  dart_openai: ^4.1.0
  chat_gpt_sdk: ^3.1.5

dev_dependencies:
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_icons:
  android: true
  ios: false
  image_path: "assets/logo.jpg"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/register.png
    - assets/Login-amico.png
    - assets/greenhouse.jpg
    - assets/logo1.png
    - assets/logo2.png
    - assets/logo3.png
    - assets/models/crop_recommendation_model.tflite
    - assets/logo.jpg

flutter_intl:
  enabled: true