<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GreenAdmin — Messages</title>
  <link rel="icon" href="logo.png" type="image/png">

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/sidebar.css">
  <link rel="stylesheet" href="../css/footer.css">
  <link rel="stylesheet" href="../css/cards.css">
  <link rel="stylesheet" href="../css/buttons.css">
  <link rel="stylesheet" href="../css/responsive.css">

  <style>
    /* ══════════════════════════════════════════════════
       MESSAGES PAGE — fully inherits app CSS variables
       ══════════════════════════════════════════════════ */

    /* ── Layout ── */
    .messages-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 1rem;
      height: calc(100vh - var(--header-h, 60px) - var(--footer-h, 48px) - 3rem);
      min-height: 520px;
    }

    /* ── Users panel (left column) ── */
    .farmers-panel {
      background: var(--surface, #fff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .farmers-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border, #e5e7eb);
      flex-shrink: 0;
    }

    .farmers-panel-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text2, #374151);
    }

    .farmers-count {
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      background: #16a34a;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
      min-width: 20px;
      text-align: center;
    }

    /* ── Search bar inside the panel ── */
    .farmers-search {
      position: relative;
      padding: 0.75rem 0.875rem;
      border-bottom: 1px solid var(--border, #e5e7eb);
      flex-shrink: 0;
    }
    .farmers-search svg {
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      stroke: var(--text3, #9ca3af);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .farmers-search input {
      width: 100%;
      box-sizing: border-box;
      padding: 0.5rem 0.75rem 0.5rem 2rem;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 8px;
      font-size: 12.5px;
      color: var(--text, #111);
      background: var(--surface2, #f9fafb);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .farmers-search input:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
      background: var(--surface, #fff);
    }

    /* ── Users list ── */
    .farmers-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.375rem 0;
    }
    .farmers-list::-webkit-scrollbar { width: 4px; }
    .farmers-list::-webkit-scrollbar-track { background: transparent; }
    .farmers-list::-webkit-scrollbar-thumb { background: var(--border, #e5e7eb); border-radius: 4px; }

    .farmer-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .farmer-item:hover { background: var(--surface2, #f9fafb); }
    .farmer-item.active {
      background: rgba(22,163,74,0.07);
    }
    .farmer-item.active::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.5rem;
      bottom: 0.5rem;
      width: 3px;
      background: #16a34a;
      border-radius: 0 2px 2px 0;
    }

    .farmer-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      position: relative;
    }

    .online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 9px;
      height: 9px;
      background: #22c55e;
      border-radius: 50%;
      border: 1.5px solid var(--surface, #fff);
    }

    .farmer-info {
      flex: 1;
      min-width: 0;
    }
    .farmer-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text, #111);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .farmer-last-msg {
      font-size: 11.5px;
      color: var(--text3, #9ca3af);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .farmer-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 3px;
      flex-shrink: 0;
    }
    .farmer-time {
      font-size: 10.5px;
      color: var(--text3, #9ca3af);
    }
    .unread-badge {
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      background: #16a34a;
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      min-width: 18px;
      text-align: center;
    }

    /* ── Chat window (right column) ── */
    .chat-window {
      background: var(--surface, #fff);
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Empty state ── */
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--text3, #9ca3af);
      padding: 2rem;
    }
    .empty-chat svg {
      width: 44px;
      height: 44px;
      stroke: var(--border, #e5e7eb);
      fill: none;
      stroke-width: 1.5;
    }
    .empty-chat h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text2, #374151);
      margin: 0;
    }
    .empty-chat p {
      font-size: 13px;
      margin: 0;
    }

    /* ── Chat header ── */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem 1.125rem;
      border-bottom: 1px solid var(--border, #e5e7eb);
      flex-shrink: 0;
    }
    .chat-farmer-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .chat-farmer-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text, #111);
    }
    .chat-farmer-status {
      font-size: 11.5px;
      color: #16a34a;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .chat-farmer-status::before {
      content: "";
      width: 6px;
      height: 6px;
      background: #22c55e;
      border-radius: 50%;
      display: inline-block;
    }
    .chat-header-actions {
      margin-left: auto;
    }
    .chat-header-actions .icon-btn {
      width: 32px;
      height: 32px;
    }

    /* ── Messages area ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.125rem;
      display: flex;
      flex-direction: column;
      gap: 0.125rem;
      background: var(--surface2, #f9fafb);
    }
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border, #e5e7eb); border-radius: 4px; }

    /* ── Date divider ── */
    .date-divider {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text3, #9ca3af);
      margin: 0.625rem 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .date-divider::before,
    .date-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border, #e5e7eb);
    }

    /* ── Message row ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .msg-row.admin {
      flex-direction: row-reverse;
    }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .msg-bubble {
      max-width: 68%;
      padding: 0.625rem 0.875rem;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg-row.farmer .msg-bubble {
      background: var(--surface, #fff);
      border: 1px solid var(--border, #e5e7eb);
      color: var(--text, #111);
      border-bottom-left-radius: 4px;
    }
    .msg-row.admin .msg-bubble {
      background: #16a34a;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10.5px;
      color: var(--text3, #9ca3af);
      margin-top: 3px;
      padding: 0 2px;
    }
    .msg-row.admin .msg-time { text-align: right; }

    /* ── Input area ── */
    .chat-input-area {
      display: flex;
      align-items: flex-end;
      gap: 0.625rem;
      padding: 0.875rem 1rem;
      border-top: 1px solid var(--border, #e5e7eb);
      flex-shrink: 0;
      background: var(--surface, #fff);
    }

    .chat-input-box {
      flex: 1;
      resize: none;
      border: 1px solid var(--border, #e5e7eb);
      border-radius: 10px;
      padding: 0.625rem 0.875rem;
      font-size: 13.5px;
      font-family: inherit;
      color: var(--text, #111);
      background: var(--surface2, #f9fafb);
      outline: none;
      line-height: 1.5;
      transition: border-color 0.15s, box-shadow 0.15s;
      max-height: 120px;
      overflow-y: auto;
    }
    .chat-input-box:focus {
      border-color: #16a34a;
      box-shadow: 0 0 0 3px rgba(22,163,74,0.12);
      background: var(--surface, #fff);
    }
    .chat-input-box::placeholder { color: var(--text3, #9ca3af); }

    .send-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 10px;
      background: #16a34a;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: #15803d; }
    .send-btn:active { transform: scale(0.94); }
    .send-btn svg {
      width: 16px;
      height: 16px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Role badge in chat header ── */
    .chat-header-badge {
      flex-shrink: 0;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .role-badge {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      background: rgba(22,163,74,0.1);
      color: #16a34a;
      border: 1px solid rgba(22,163,74,0.2);
    }
    .role-badge[style*="admin"],
    .role-badge:contains("admin") { background: rgba(99,102,241,0.1); color: #6366f1; border-color: rgba(99,102,241,0.2); }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .messages-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 260px 1fr;
        height: auto;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <div id="header"></div>

    <div class="layout">
      <div id="sidebar"></div>

      <main class="main-content">

        <div class="page-header">
          <h1>Messages</h1>
          <p>Chat with your farmers in real-time</p>
        </div>

        <div class="messages-layout">

          <!-- ── Users Panel ── -->
          <div class="farmers-panel">
            <div class="farmers-panel-header">
              <span class="farmers-panel-title">Users</span>
              <span class="farmers-count" id="farmerCount">0</span>
            </div>
            <div class="farmers-search">
              <svg viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/>
                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="text" id="searchInput" placeholder="Search user…" />
            </div>
            <div class="farmers-list" id="farmersList">
              <!-- Populated by messages.js -->
            </div>
          </div>

          <!-- ── Chat Window ── -->
          <div class="chat-window" id="chatWindow">
            <div class="empty-chat" id="emptyState">
              <svg viewBox="0 0 24 24">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              <h3>Select a farmer</h3>
              <p>Choose a farmer from the list to start chatting</p>
            </div>
          </div>

        </div>
      </main>
    </div>

    <div id="footer"></div>
  </div>

  <script type="module">
    import { initDashboard } from "../js/main.js";
    await initDashboard(".");
  </script>

  <script type="module" src="../js/messages.js"></script>
</body>
</html>
