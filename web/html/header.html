<header class="app-header">
  <div class="header-left">
    <button class="sidebar-toggle-btn" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24">
        <line x1="3" y1="6"  x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="header-brand">
      <div class="header-brand-icon"></div>
      <span class="header-brand-name">Green<span>Admin</span></span>
    </div>
  </div>

  <div class="header-right">
    <div class="header-pill">
      <button class="lang-pill-btn active" data-lang="en">EN</button>
      <button class="lang-pill-btn" data-lang="fr">FR</button>
      <button class="lang-pill-btn" data-lang="ar">AR</button>
    </div>
    <button class="icon-btn" id="darkToggle" aria-label="Toggle dark mode">
      <svg class="icon-sun" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
    <div class="header-avatar" title="Admin">A</div>
  </div>
</header>
